name: RAM Speed Benchmark
on: [workflow_dispatch]

jobs:
  benchmark-ram:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y fio sysbench

      - name: 📊 Check Specs (RAM Size)
        run: |
          echo "--- RAM Info ---"
          free -h
          echo "--- /dev/shm Size ---"
          df -h /dev/shm

      - name: 🚀 Test 1 - RAM Disk Write Speed (/dev/shm)
        run: |
          # Тестируем скорость записи файла прямо в оперативную память
          # Это покажет, как быстро можно работать с временными файлами
          echo "--- Writing 2GB to RAM (/dev/shm) ---"
          fio --name=ram_write --filename=/dev/shm/testfile --ioengine=libaio --rw=write --bs=1M --size=2G --numjobs=1 --direct=1 --group_reporting
          rm /dev/shm/testfile

      - name: ⚡ Test 2 - Raw RAM Speed (Sysbench)
        run: |
          # Тест чистой пропускной способности памяти (Memory Bandwidth)
          # Операции записи в блоках по 1КБ и 1МБ
          echo "--- Sysbench Memory Test (1K block) ---"
          sysbench memory --memory-block-size=1K --memory-total-size=100G run
          
          echo "--- Sysbench Memory Test (1M block) ---"
          sysbench memory --memory-block-size=1M --memory-total-size=100G run
